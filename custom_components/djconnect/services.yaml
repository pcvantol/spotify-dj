test_parse:
  name: Test Assist parser
  description: >
    Developer test: send text through the configured Home Assistant Assist
    conversation pipeline and return the DJConnect intent. This action does not
    start Spotify playback or send a DJ announcement.
  fields:
    command_text:
      name: Command text
      description: Text as the DJConnect device would send it after HA Assist STT.
      example: "Ik wil het nieuwste album van Pearl Jam horen"
      required: true
      selector:
        text:
          multiline: false

test_tts:
  name: Test DJ announcement
  description: >
    Developer test: send a standalone DJ announcement to the paired DJConnect
    device. Home Assistant tries to create a temporary WAV or MP3 audio_url through
    the configured TTS engine; if that fails, DJConnect sends text only so the
    device can display the announcement.
  fields:
    dj_response_text:
      name: DJ announcement text
      description: Text the DJConnect device should display and speak when possible.
      example: "Daar gaan we. DJConnect is gekoppeld, de stem werkt, en ik sta klaar voor je volgende plaat."
      required: true
      selector:
        text:
          multiline: true

test_command:
  name: Test full text command
  description: >
    Developer test: use the same text-command route as the DJConnect device.
    Text goes through HA Assist to a DJConnect intent, can optionally start
    Spotify playback, and then sends the DJ announcement to the ESP device.
  fields:
    command_text:
      name: Command text
      description: Music request or command text.
      example: "Speel mijn favoriete nummers"
      required: true
      selector:
        text:
          multiline: false
    play:
      name: Start playback
      description: Turn off to test parser/result data without starting Spotify playback.
      required: false
      default: true
      selector:
        boolean:

test_ptt_text:
  name: Test PTT text flow
  description: >
    Developer test: start exactly after STT conversion. Enter the natural
    language sentence the user said; DJConnect runs intent parsing, Spotify
    search/playback, DJ announcement generation with text/audio, and sends the
    result back to the connected DJConnect device/client.
  fields:
    command_text:
      name: Natural language text
      description: Text as recognized by STT from a PTT voice request.
      example: "Speel nummer Black van Pearl Jam"
      required: true
      selector:
        text:
          multiline: false

start_spotify_oauth:
  name: Start Spotify OAuth
  description: >
    Developer helper: create a Spotify PKCE authorization URL for the Home
    Assistant playback backend. Open the URL, sign in to Spotify, and the
    callback stores the refresh token in DJConnect.
  fields:
    client_id:
      name: Spotify Client ID
      description: Spotify Developer App Client ID. Leave empty to use the value from DJConnect options.
      required: false
      selector:
        text:
          multiline: false
    ha_base_url:
      name: Home Assistant external URL
      description: >
        Base URL Spotify can reach after login, preferably your Nabu Casa URL.
        Leave empty to use the URL from DJConnect options. The full redirect URI
        is this URL plus /api/djconnect/spotify/callback.
      required: false
      example: "https://example.ui.nabu.casa"
      selector:
        text:
          multiline: false
    market:
      name: Spotify market
      description: Spotify region for search and playback.
      required: false
      default: NL
      selector:
        select:
          options:
            - NL
            - BE
            - DE
            - FR
            - GB
            - US
          mode: dropdown
    scopes:
      name: Spotify scopes
      description: Spotify OAuth scopes. Leave empty for the default DJConnect scopes.
      required: false
      selector:
        text:
          multiline: true

device_command:
  name: Send device command
  description: >
    Developer helper: send a command to the paired DJConnect device through the
    local /api/device/command endpoint using the stored bearer token.
  fields:
    command:
      name: Command
      description: Local DJConnect command, for example status, next, previous, set_volume, set_output, start_playlist, set_language or dj_response.
      required: true
      selector:
        text:
          multiline: false
    payload:
      name: Payload
      description: >
        Optional command payload as an object, for example {"value": 35}.
      required: false
      selector:
        object:

refresh_device_info:
  name: Refresh device info
  description: >
    Developer helper: fetch /api/device/info from the paired DJConnect device and
    update Home Assistant status sensors.
  fields: {}

reboot_device:
  name: Reboot device
  description: >
    Developer helper: ask the paired DJConnect device to reboot through
    /api/device/reboot.
  fields: {}

forget_device:
  name: Forget device pairing
  description: >
    Developer helper: ask the paired DJConnect device to forget its local pairing
    through /api/device/forget. Re-pair the device afterwards.
  fields: {}
