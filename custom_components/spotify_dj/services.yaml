test_parse:
  name: Test Assist parser
  description: >
    Developer test: send text through the configured Home Assistant Assist
    conversation pipeline and return the SpotifyDJ intent. This action does not
    start Spotify playback or send a DJ response.
  fields:
    text:
      name: Command text
      description: Text as the SpotifyDJ device would send it after HA Assist STT.
      example: "Ik wil het nieuwste album van Pearl Jam horen"
      required: true
      selector:
        text:
          multiline: false

test_tts:
  name: Test ESP DJ response
  description: >
    Developer test: send a standalone DJ response to the paired SpotifyDJ
    device. Home Assistant tries to create a temporary WAV or MP3 audio_url through
    the configured TTS engine; if that fails, SpotifyDJ sends text only so the
    device can display the response.
  fields:
    text:
      name: DJ response text
      description: Text the SpotifyDJ device should display and speak when possible.
      example: "Daar gaan we. SpotifyDJ is gekoppeld, de stem werkt, en ik sta klaar voor je volgende plaat."
      required: true
      selector:
        text:
          multiline: true

test_command:
  name: Test full text command
  description: >
    Developer test: use the same text-command route as the SpotifyDJ device.
    Text goes through HA Assist to a SpotifyDJ intent, can optionally start
    Spotify playback, and then sends the DJ response to the ESP device.
  fields:
    text:
      name: Command text
      description: Music request or command text.
      example: "Speel mijn favoriete nummers"
      required: true
      selector:
        text:
          multiline: false
    play:
      name: Start playback
      description: Turn off to test parser/result data without starting Spotify playback.
      required: false
      default: true
      selector:
        boolean:

start_spotify_oauth:
  name: Start Spotify OAuth
  description: >
    Developer helper: create a Spotify PKCE authorization URL for the Home
    Assistant playback backend. Open the URL, sign in to Spotify, and the
    callback stores the refresh token in SpotifyDJ.
  fields:
    client_id:
      name: Spotify Client ID
      description: Spotify Developer App Client ID. Leave empty to use the value from SpotifyDJ options.
      required: false
      selector:
        text:
          multiline: false
    ha_base_url:
      name: Home Assistant external URL
      description: >
        Base URL Spotify can reach after login, preferably your Nabu Casa URL.
        Leave empty to use the URL from SpotifyDJ options. The full redirect URI
        is this URL plus /api/spotify_dj/spotify/callback.
      required: false
      example: "https://example.ui.nabu.casa"
      selector:
        text:
          multiline: false
    market:
      name: Spotify market
      description: Spotify region for search and playback.
      required: false
      default: NL
      selector:
        select:
          options:
            - NL
            - BE
            - DE
            - FR
            - GB
            - US
          mode: dropdown
    scopes:
      name: Spotify scopes
      description: Spotify OAuth scopes. Leave empty for the default SpotifyDJ scopes.
      required: false
      selector:
        text:
          multiline: true

device_command:
  name: Send device command
  description: >
    Developer helper: send a command to the paired SpotifyDJ device through the
    local /api/device/command endpoint using the stored bearer token.
  fields:
    command:
      name: Command
      description: Local SpotifyDJ command, for example status, next, previous, set_volume, set_output, start_playlist, set_language or dj_response.
      required: true
      selector:
        text:
          multiline: false
    payload:
      name: Payload
      description: >
        Optional command payload as an object, for example {"value": 35}.
      required: false
      selector:
        object:

refresh_device_info:
  name: Refresh device info
  description: >
    Developer helper: fetch /api/device/info from the paired SpotifyDJ device and
    update Home Assistant status sensors.
  fields: {}

reboot_device:
  name: Reboot device
  description: >
    Developer helper: ask the paired SpotifyDJ device to reboot through
    /api/device/reboot.
  fields: {}

forget_device:
  name: Forget device pairing
  description: >
    Developer helper: ask the paired SpotifyDJ device to forget its local pairing
    through /api/device/forget. Re-pair the device afterwards.
  fields: {}
