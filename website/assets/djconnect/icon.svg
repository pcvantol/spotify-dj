      <stop offset="0.5" stop-color="#232a43"/>
      <stop offset="0.82" stop-color="#dde8ff"/>
      <stop offset="1" stop-color="#65718f"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="150%">
