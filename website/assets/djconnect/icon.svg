<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024" role="img" aria-labelledby="title desc">
  <title id="title">DJConnect icon</title>
  <desc id="desc">A purple-blue DJ vinyl record with DJ letters and a vintage broadcast microphone.</desc>
  <defs>
    <radialGradient id="bg" cx="32%" cy="18%" r="88%">
      <stop offset="0" stop-color="#4f7cff"/>
      <stop offset="0.42" stop-color="#4020a8"/>
      <stop offset="1" stop-color="#090714"/>
    </radialGradient>
    <radialGradient id="vinyl" cx="36%" cy="28%" r="72%">
      <stop offset="0" stop-color="#343047"/>
      <stop offset="0.42" stop-color="#13111d"/>
      <stop offset="1" stop-color="#030207"/>
    </radialGradient>
    <linearGradient id="accent" x1="152" y1="142" x2="902" y2="870" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#66e0ff"/>
      <stop offset="0.48" stop-color="#7b5cff"/>
      <stop offset="1" stop-color="#db5cff"/>
    </linearGradient>
    <linearGradient id="accent2" x1="222" y1="744" x2="880" y2="156" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#42d9ff"/>
      <stop offset="0.52" stop-color="#8368ff"/>
