      <path d="M170 516a284 284 0 0 1 284-284" fill="none" stroke="#fff" stroke-opacity="0.12" stroke-width="8" stroke-linecap="round"/>
      <path d="M225 688c102 106 282 122 405 34" fill="none" stroke="#66e0ff" stroke-opacity="0.15" stroke-width="9" stroke-linecap="round"/>
      <circle cx="454" cy="514" r="96" fill="#151023" stroke="url(#accent)" stroke-width="16"/>
      <circle cx="454" cy="514" r="22" fill="#0b0814" stroke="#b9c7ff" stroke-opacity="0.7" stroke-width="6"/>
    </g>
    <g filter="url(#shadow)">
      <path d="M692 170c58-31 133 11 133 78 0 44-32 80-74 87-37 135-80 252-164 337-46 46-93 74-137 89l-34-74c36-12 73-35 108-70 67-68 103-170 136-287-29-25-39-67-23-103a88 88 0 0 1 55-57Z" fill="#080711" stroke="#030207" stroke-width="24" stroke-linejoin="round"/>
