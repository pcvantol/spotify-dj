<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 980" role="img" aria-labelledby="title desc">
  <title id="title">DJConnect device illustration based on LilyGO T-Embed form factor</title>
  <desc id="desc">A stylized black handheld DJConnect remote with screen, rotary control and purple-blue LED ring.</desc>
  <defs>
    <radialGradient id="glow" cx="50%" cy="45%" r="60%">
      <stop offset="0%" stop-color="#1ed760" stop-opacity="0.42"/>
      <stop offset="60%" stop-color="#38bdf8" stop-opacity="0.13"/>
      <stop offset="100%" stop-color="#000" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="body" x1="15%" x2="86%" y1="7%" y2="95%">
      <stop offset="0%" stop-color="#283241"/>
      <stop offset="48%" stop-color="#111827"/>
      <stop offset="100%" stop-color="#030407"/>
    </linearGradient>
    <linearGradient id="screen" x1="0%" x2="100%" y1="0%" y2="100%">
      <stop offset="0%" stop-color="#182233"/>
      <stop offset="60%" stop-color="#070b12"/>
      <stop offset="100%" stop-color="#050608"/>
    </linearGradient>
    <filter id="shadow" x="-30%" y="-20%" width="160%" height="150%">
      <feDropShadow dx="0" dy="42" stdDeviation="38" flood-color="#000" flood-opacity="0.55"/>
    </filter>
    <filter id="greenGlow" x="-40%" y="-40%" width="180%" height="180%">
      <feDropShadow dx="0" dy="0" stdDeviation="18" flood-color="#1ed760" flood-opacity="0.65"/>
    </filter>
  </defs>
  <rect width="900" height="980" fill="url(#glow)"/>
  <g filter="url(#shadow)">
    <rect x="245" y="70" width="410" height="840" rx="58" fill="url(#body)" stroke="rgba(255,255,255,0.22)" stroke-width="3"/>
    <rect x="286" y="116" width="328" height="326" rx="34" fill="url(#screen)" stroke="rgba(255,255,255,0.18)" stroke-width="2"/>
    <circle cx="450" cy="280" r="78" fill="none" stroke="#1ed760" stroke-width="16" stroke-linecap="round" stroke-dasharray="330 80" filter="url(#greenGlow)"/>
    <circle cx="450" cy="280" r="42" fill="#0b0d12" stroke="rgba(255,255,255,0.2)" stroke-width="2"/>
    <text x="450" y="205" text-anchor="middle" fill="#b7bccb" font-family="Inter, Arial, sans-serif" font-size="22" font-weight="700">DJConnect</text>
    <text x="450" y="505" text-anchor="middle" fill="#f7f7fb" font-family="Inter, Arial, sans-serif" font-size="28" font-weight="800">Push to talk</text>
    <circle cx="450" cy="642" r="128" fill="#0a0d13" stroke="#1ed760" stroke-width="22" filter="url(#greenGlow)"/>
    <circle cx="450" cy="642" r="58" fill="#151b26" stroke="rgba(255,255,255,0.20)" stroke-width="3"/>
    <polygon points="431,609 431,675 484,642" fill="#1ed760"/>
    <circle cx="333" cy="792" r="21" fill="#1f2937" stroke="rgba(255,255,255,0.18)"/>
    <circle cx="450" cy="810" r="25" fill="#1f2937" stroke="rgba(255,255,255,0.18)"/>
    <circle cx="567" cy="792" r="21" fill="#1f2937" stroke="rgba(255,255,255,0.18)"/>
  </g>
</svg>
